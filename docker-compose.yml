services:
  api:
    build: .
    env_file:
      - .env
    environment:
      SQLITE_PATH: /app/data/db.sqlite3
    expose:
      - "8000"
    volumes:
      - api_data:/app/data
    command: >
      sh -c "python manage.py migrate &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000"
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  api_data:
  caddy_data:
  caddy_config:
